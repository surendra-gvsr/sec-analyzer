services:
  - type: web
    name: sec-filing-analyzer
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: '3.12.4'
      - key: ENVIRONMENT
        value: production
      - key: GROQ_MODEL
        value: llama3-8b-8192
      - key: TARGET_TICKERS
        value: 'AAPL,MSFT'
      - key: TARGET_YEARS
        value: '2021,2022,2023,2024'
      - key: LLAMA_CLOUD_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SEC_USER_EMAIL
        sync: false
